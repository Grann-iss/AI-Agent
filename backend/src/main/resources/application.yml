#     api-key: ${QWEN_API_KEY}
#   zhipu:
#     api-key: ${ZHIPU_API_KEY}

logging:
  level:
    com.paiagent: DEBUG

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
